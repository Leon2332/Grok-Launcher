app-id: org.grokbuild.Launcher
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: grok-launcher

finish-args:
  - --talk-name=org.freedesktop.Flatpak
  - --socket=session-bus
  - --talk-name=org.freedesktop.Notifications
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --device=dri

modules:
  - name: grok-launcher
    buildsystem: simple
    build-commands:
      - install -Dm755 grok-launcher.sh /app/bin/grok-launcher
      - install -Dm644 org.grokbuild.Launcher.desktop /app/share/applications/org.grokbuild.Launcher.desktop
      - install -Dm644 org.grokbuild.Launcher.png /app/share/icons/hicolor/512x512/apps/org.grokbuild.Launcher.png
      # File-manager context menu integrations (copied to host via --install-context-menu)
      - install -Dm644 integrations/kde/org.grokbuild.Launcher-open-folder.desktop /app/share/grok-launcher/integrations/kde/org.grokbuild.Launcher-open-folder.desktop
      - install -Dm644 integrations/nemo/open-with-grok.nemo_action /app/share/grok-launcher/integrations/nemo/open-with-grok.nemo_action
      - install -Dm644 integrations/nautilus/open_with_grok.py /app/share/grok-launcher/integrations/nautilus/open_with_grok.py
    sources:
      - type: file
        path: grok-launcher.sh
      - type: file
        path: assets/org.grokbuild.Launcher.desktop
      - type: file
        path: assets/org.grokbuild.Launcher.png
      - type: dir
        path: integrations
        dest: integrations
